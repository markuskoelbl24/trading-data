<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Trading-Data (FIFO)</title>
<style>
  :root{
    --bg:#0f1216; --card:#181d24; --card2:#1f2630; --line:#2a323d;
    --txt:#e7ecf2; --muted:#8a95a3; --accent:#4c8bf5;
    --green:#39c07a; --red:#f0554d; --amber:#e9b23a;
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-text-size-adjust:100%}
  body{padding:14px 12px calc(96px + env(safe-area-inset-bottom));max-width:920px;margin:0 auto}
  h1{font-size:20px;margin:2px 0 2px}
  .sub{color:var(--muted);font-size:12.5px;margin-bottom:14px;line-height:1.4}
  button{font:inherit;cursor:pointer;border:none;border-radius:10px}
  .btn{background:var(--accent);color:#fff;padding:10px 14px;font-weight:600}
  .btn.sec{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);padding:7px 10px;font-size:13px}
  .btn.sm{padding:6px 10px;font-size:13px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .spacer{flex:1}
  input,select{font:inherit;background:var(--card2);border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:10px 11px;width:100%;min-width:0}
  input[type=date]{-webkit-appearance:none;appearance:none;text-align:left}
  label{font-size:12px;color:var(--muted);display:block;margin:0 0 4px}
  .pos{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:13px 13px 11px;margin:12px 0}
  .pos-head{display:flex;align-items:flex-start;gap:10px}
  .badge{font-size:11px;color:var(--muted);background:var(--card2);border:1px solid var(--line);
    padding:2px 8px;border-radius:999px;white-space:nowrap}
  .titel{font-size:17px;font-weight:700;line-height:1.15}
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:11px 0 4px}
  .kpi{background:var(--card2);border:1px solid var(--line);border-radius:11px;padding:9px 8px}
  .kpi .k{font-size:11px;color:var(--muted);margin-bottom:3px}
  .kpi .v{font-size:clamp(13px,4.2vw,15.5px);font-weight:700;white-space:nowrap;letter-spacing:-.2px}
  .kpi .v2{font-size:11.5px;font-weight:600;color:var(--muted)}
  .meta{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:12.5px;color:var(--muted);margin:8px 2px 2px}
  .meta b{color:var(--txt);font-weight:600}
  .einstand{margin:10px 0 2px;padding:9px 11px 11px;background:var(--card2);
    border:1px solid var(--line);border-radius:11px;font-size:13px}
  .es-vals{display:flex;flex-wrap:wrap;align-items:center;gap:4px 12px}
  .es-vals .lbl{color:var(--muted)}
  .es-vals b{font-weight:700}
  .es-vals .be-delta{margin-left:auto;font-weight:700;white-space:nowrap}
  .g{display:inline-block;vertical-align:middle}
  .g.ring{width:9px;height:9px;border:2px solid var(--muted);border-radius:50%;background:transparent;margin-right:1px}
  .g.bar{width:3px;height:12px;background:var(--txt);border-radius:2px;margin-right:2px}
  .g.dot{width:10px;height:10px;border-radius:50%;margin-right:1px}
  .g.dot.up{background:var(--green)} .g.dot.down{background:var(--red)}
  .es-bar{position:relative;height:22px;margin-top:11px}
  .es-track{position:absolute;top:9px;left:2px;right:2px;height:4px;background:var(--line);border-radius:3px}
  .es-fill{position:absolute;top:8px;height:6px;border-radius:3px;opacity:.9}
  .es-fill.up{background:var(--green)} .es-fill.down{background:var(--red)}
  .es-mark{position:absolute;transform:translateX(-50%)}
  .es-mark.ring{top:2px;width:12px;height:12px;border:2px solid var(--muted);border-radius:50%;background:var(--card2)}
  .es-mark.bar{top:0;width:3px;height:20px;background:var(--txt);border-radius:2px}
  .es-mark.dot{top:2px;width:15px;height:15px;border-radius:50%;border:3px solid var(--card2)}
  .es-mark.dot.up{background:var(--green)} .es-mark.dot.down{background:var(--red)}
  .pos-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
  details{margin-top:9px;border-top:1px dashed var(--line);padding-top:8px}
  summary{cursor:pointer;color:var(--muted);font-size:13px;list-style:none;user-select:none}
  summary::-webkit-details-marker{display:none}
  summary::before{content:"▸ ";color:var(--accent)}
  details[open] summary::before{content:"▾ "}
  .tx{display:grid;grid-template-columns:auto 1fr auto auto;gap:4px 10px;align-items:center;
    padding:7px 2px;border-bottom:1px solid var(--line);font-size:13px}
  .tx:last-child{border-bottom:none}
  .tx .tag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap}
  .tag.kauf{background:rgba(76,139,245,.16);color:#8fb6ff}
  .tag.verkauf{background:rgba(233,178,58,.16);color:#f0cd75}
  .tag.div{background:rgba(57,192,122,.16);color:#7fe0ac}
  .tx .desc{color:var(--muted);font-size:12px;min-width:0}
  .tx .desc .nb{white-space:nowrap}

  .tx .txedit{color:var(--muted);background:transparent;border:1px solid var(--line);
    border-radius:8px;padding:3px 8px;font-size:12px}

  .pos.stop{border-color:var(--red)}
  .stopmsg{color:var(--red);font-size:12.5px;margin:8px 2px 0;font-weight:600}
  .badge.badge-red{color:#ffb4b0;border-color:var(--red);background:rgba(240,85,77,.14)}
  .divchip{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:999px;
    padding:2px 9px 2px 6px;font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;line-height:1.5}
  .divchip .cbox{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;
    border-radius:4px;border:1.5px solid var(--green);background:var(--green);color:#04120a;font-size:11px;font-weight:800}
  .divchip.off{color:var(--muted)}
  .divchip.off .cbox{background:transparent;border-color:var(--muted)}
  .closed-sec{margin-top:22px}
  .closed-sec>summary.closed-sum{margin:0 3px 2px;padding:6px 0}
  .closed-sec .pos{opacity:.82}
  .green{color:var(--green)} .red{color:var(--red)} .amber{color:var(--amber)}
  .grp-title{font-size:12.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;
    margin:20px 3px 2px;font-weight:700}
  /* --- Redesign Karten-Kopf --- */
  .pos-head{cursor:pointer}
  .ph-left{flex:1;min-width:0}
  .titel .chev{color:var(--muted);font-size:12px;font-weight:400;margin-left:5px}
  .ph-sub{color:var(--muted);font-size:13px;margin-top:4px;display:flex;flex-wrap:wrap;gap:3px 9px;align-items:center}
  .ph-sub b{color:var(--txt);font-weight:700}
  .ph-sub .ph-ges{white-space:nowrap}
  .ph-sub .gv{cursor:pointer}
  .ph-sub .gv.green{color:var(--green)} .ph-sub .gv.red{color:var(--red)}
  .ph-right{text-align:right;white-space:nowrap}
  .ph-kurs{font-size:17px;font-weight:700}
  .ph-day{font-size:13px;font-weight:700;margin-top:2px;cursor:pointer;display:inline-block}
  .ph-day.up{color:var(--green)} .ph-day.down{color:var(--red)} .ph-day.flat{color:var(--muted);cursor:default}
  .ph-edit{align-self:flex-start}
  .pos-body{margin-top:12px}
  /* Sortier-Leiste */
  .sortsel{display:flex;align-items:center;gap:9px;margin:16px 3px 4px}
  .sortsel .sl{color:var(--muted);font-size:12px}
  .sortseg{display:inline-flex;background:var(--card2);border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .sortseg button{background:transparent;color:var(--muted);font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:0}
  .sortseg button.on{background:var(--accent);color:#fff}
  /* Break-even-Leiste (Labels an Markern, zentriert) */
  .esb{position:relative;height:66px;margin:4px 2px 2px}
  .esb-trk{position:absolute;left:0;right:0;top:38px;height:4px;border-radius:3px;background:var(--line);transform:translateY(-50%)}
  .esb-fill{position:absolute;top:38px;height:4px;border-radius:3px;transform:translateY(-50%)}
  .esb-fill.up{background:var(--green)} .esb-fill.down{background:var(--red)}
  .esb-mk{position:absolute;top:38px;transform:translate(-50%,-50%)}
  .esb-mk .d{width:11px;height:11px;border-radius:50%}
  .esb-mk.e .d{background:transparent;border:2px solid var(--muted)}
  .esb-mk.j .d{width:14px;height:14px;background:var(--txt);border:3px solid var(--card)}
  .esb-mk.b .l{width:3px;height:15px;border-radius:2px;background:var(--accent)}
  .esb-lab{position:absolute;font-size:11.5px;white-space:nowrap}
  .esb-lab .n{color:var(--muted)} .esb-lab .v{font-weight:700}
  .esb-lab.e .v,.esb-lab .pl.e .v{color:var(--muted);font-weight:600}   /* Einstieg grau wie sein Marker */
  .esb-lab.j .v{color:var(--txt)}                                        /* aktueller Kurs weiß wie sein Marker */
  .esb-lab.pair{display:inline-flex;gap:14px}
  .esb-pct{position:absolute;top:38px;transform:translate(-50%,-50%);font-size:11px;font-weight:700;background:var(--card);padding:1px 5px;border-radius:6px;white-space:nowrap}
  .esb-pct.up{color:var(--green)} .esb-pct.down{color:var(--red)}
  .esb-lab.top{top:5px} .esb-lab.bot{top:50px}
  .esb-lab.be .v{color:var(--accent)}
  /* Portfolio-Summe */
  .total{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);
    border-radius:var(--radius);padding:13px 14px;margin-bottom:6px}
  .total .kpis{margin:8px 0 0}
  .total .v{font-size:clamp(13px,4vw,15.5px)}
  /* Overlay/Modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:50;
    align-items:flex-end;justify-content:center}
  .overlay.on{display:flex}
  .sheet{background:var(--card);border:1px solid var(--line);border-radius:18px 18px 0 0;
    width:100%;max-width:520px;max-height:92vh;overflow:auto;padding:16px 15px 24px}
  @media(min-width:560px){.overlay{align-items:center}.sheet{border-radius:18px}}
  .sheet h2{font-size:17px;margin:2px 0 12px}
  .field{margin-bottom:11px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .two>*{min-width:0}
  .seg{display:flex;background:var(--card2);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{flex:1;background:transparent;color:var(--muted);padding:10px;font-weight:600;border-radius:0}
  .seg button.act{background:var(--accent);color:#fff}
  .sheet-actions{display:flex;gap:9px;margin-top:6px}
  .sheet-actions .btn{flex:1;text-align:center}
  .del{color:var(--red);background:transparent;border:1px solid var(--line);padding:10px 12px;border-radius:10px}
  .fab{position:fixed;left:0;right:0;bottom:0;padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,transparent,var(--bg) 34%);display:flex;gap:9px;max-width:920px;margin:0 auto}
  .fab .btn{flex:1}
  .hint{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.4}
  .empty-all{text-align:center;color:var(--muted);padding:40px 10px;font-size:14px;line-height:1.5}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(16px);
    background:var(--green);color:#04120a;font-weight:700;padding:9px 16px;border-radius:999px;
    font-size:13.5px;opacity:0;pointer-events:none;transition:.22s;z-index:80;
    box-shadow:0 6px 20px rgba(0,0,0,.45)}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  #symResults{max-height:230px;overflow:auto;margin-top:6px}
  .sym-hit{display:block;width:100%;text-align:left;background:var(--card2);border:1px solid var(--line);
    color:var(--txt);border-radius:9px;padding:8px 10px;margin:5px 0;font-size:12.5px;line-height:1.35}
  .sym-hit:active{background:var(--line)}
</style>

<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin:2px 0 14px">
  <h1 style="margin:0">Trading-Data <span style="font-size:12px;color:var(--muted);font-weight:400">FIFO</span></h1>
  <button class="btn ghost" style="flex:none;display:inline-flex;align-items:center;gap:5px;padding:8px 13px;font-size:14px;color:#c3ccd6" onclick="openBackup()"><span style="font-size:19px;line-height:1">⚙︎</span>Setup</button>
</div>

<div id="total" class="total"></div>
<div id="list"></div>

<div class="fab">
  <button class="btn" onclick="openPos()">+ Position</button>
</div>

<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
const LS="trading_data_v1";
const LS_OLD="trading_tracker_v1";   // alter Schlüssel → wird beim ersten Laden migriert
let state=load();
const openDetails=new Set();   // welche Buchungs-Listen offen sind (bleibt über Re-Renders erhalten)
function captureOpenDetails(){  // Offen-Zustand aus dem aktuellen DOM übernehmen, bevor neu gerendert wird
  document.querySelectorAll("#list details[data-pid]").forEach(d=>{
    const id=d.getAttribute("data-pid");
    if(d.open)openDetails.add(id); else openDetails.delete(id);
  });
}

/* ---------- Persistenz ---------- */
function load(){
  let s={positions:[]};
  try{
    let r=localStorage.getItem(LS);
    if(!r){ const old=localStorage.getItem(LS_OLD); if(old){ localStorage.setItem(LS,old); r=old; } } // alten Speicher übernehmen
    if(r)s=JSON.parse(r);
  }catch(e){}
  if(!s.positions)s.positions=[];
  if(!s.settings)s.settings={};
  if(s.settings.autoRefresh===undefined)s.settings.autoRefresh=true;   // Kurse beim Start auto-laden
  if(!s.settings.sortBy)s.settings.sortBy="size";
  if(!s.settings.dayMode)s.settings.dayMode="pct";
  if(!s.settings.gesMode)s.settings.gesMode="eur";
  if(!s.settings.collapsed)s.settings.collapsed={};
  if(!s.settings.gh)s.settings.gh={token:"",repo:"",path:"trading.json",branch:"main"}; // Sync-Config (lokal, NICHT gesynct)
  if(s.settings.autoSync===undefined)s.settings.autoSync=true;  // nach Änderungen automatisch hochladen
  if(!s.tombstones)s.tombstones={};   // id -> Löschzeitpunkt (ms), gegen Lösch-Zombies beim Merge
  return s;
}
function save(){localStorage.setItem(LS,JSON.stringify(state));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function touch(o){ if(o)o._u=Date.now(); return o; }   // Änderungszeit markieren (für Merge)

/* ---------- Parsen / Formatieren ---------- */
function num(v){                                   // versteht "1.234,56" und "1234.56"
  if(typeof v==="number")return v;
  if(v==null)return 0;
  let s=String(v).trim().replace(/\s|€/g,"");
  if(s==="")return NaN;
  if(s.includes(",")){s=s.replace(/\./g,"").replace(",",".");}   // deutsch
  const n=parseFloat(s);
  return isNaN(n)?NaN:n;
}
const eur=new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR",maximumFractionDigits:2});
const pct=new Intl.NumberFormat("de-DE",{maximumFractionDigits:1});
const numf=new Intl.NumberFormat("de-DE",{maximumFractionDigits:4});
function feur(n){return (n==null||isNaN(n))?"–":eur.format(n);}
function fpct(n){return (n==null||isNaN(n))?"–":(n>=0?"+":"")+pct.format(n)+" %";}
function signEur(n){return (n>=0?"+":"")+eur.format(n);}
function cls(n){return n>0?"green":(n<0?"red":"");}
function fdate(iso){if(!iso)return"";const[y,m,d]=iso.split("-");return d+"."+m+"."+y.slice(2);}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/864e5);}
const today=()=>new Date().toISOString().slice(0,10);

/* ---------- FIFO-Kern ---------- */
function compute(pos){
  // Transaktionen chronologisch (stabil nach Eingabereihenfolge)
  const tx=(pos.tx||[]).map((t,i)=>({...t,_i:i}))
    .sort((a,b)=> (a.datum<b.datum?-1:a.datum>b.datum?1:a._i-b._i));
  const lots=[];            // FIFO-Schlange offener Käufe
  let realized=0, oversell=false, buyCostAll=0;
  const perTx={};           // Ergebnis je Verkauf (fürs Anzeigen der Paarung)
  for(const t of tx){
    const st=num(t.stueck), ku=num(t.kurs), ge=num(t.gebuehr)||0;
    if(!(st>0)||isNaN(ku))continue;
    if(t.typ==="kauf"){
      lots.push({q:st, price:ku, fps:ge/st});      // Gebühr pro Stück
      buyCostAll+=st*ku+ge;
    }else{ // verkauf
      const sfps=ge/st; let toSell=st, r=0, matched=[];
      while(toSell>1e-9 && lots.length){
        const lot=lots[0];
        const q=Math.min(toSell,lot.q);
        const proceeds=q*ku - q*sfps;
        const cost=q*lot.price + q*lot.fps;
        r+=proceeds-cost;
        matched.push({q,price:lot.price});
        lot.q-=q; toSell-=q;
        if(lot.q<=1e-9)lots.shift();
      }
      if(toSell>1e-9)oversell=true;   // mehr verkauft als gehalten
      realized+=r;
      perTx[t.id]={realized:r, matched};
    }
  }
  const openQty=lots.reduce((s,l)=>s+l.q,0);
  const openCost=lots.reduce((s,l)=>s+l.q*(l.price+l.fps),0);
  const avg=openQty>0?openCost/openQty:0;
  const kurs=num(pos.kursAktuell);
  const hasKurs=!isNaN(kurs)&&openQty>0;
  const curVal=hasKurs?openQty*kurs:0;
  const unreal=hasKurs?curVal-openCost:0;
  const divs=(pos.div||[]).reduce((s,d)=>s+ (num(d.netto)||0),0);
  const divCounted=!pos.divOff;   // Dividende zählt standardmäßig mit; pro Position abwählbar
  const gesamt=realized+(hasKurs?unreal:0)+(divCounted?divs:0);
  // Zeit & Jahresrendite
  const dates=tx.map(t=>t.datum).filter(Boolean).sort();
  const first=dates[0], last=dates[dates.length-1];
  const closed=openQty<=1e-9;
  const endD=closed?last:today();
  const days=first?Math.max(1,daysBetween(first,endD)):0;
  const gesamtPct=buyCostAll>0?gesamt/buyCostAll*100:NaN;
  const unrealPct=openCost>0?unreal/openCost*100:NaN;
  const jahr=(days>0&&!isNaN(gesamtPct))?gesamtPct*365/days:NaN;
  // Einstand / "runtergetradet": erster Kaufkurs vs. effektiver Break-even
  const firstBuy=tx.find(t=>t.typ==="kauf");
  const erstEinstieg=firstBuy?num(firstBuy.kurs):NaN;
  // Break-even = Kurs, bei dem GESAMT-Position (inkl. realisiert, ohne unreal) = 0
  const breakEven=openQty>0?(openCost-realized-(divCounted?divs:0))/openQty:NaN;
  const beDelta=(!isNaN(erstEinstieg)&&!isNaN(breakEven))?breakEven-erstEinstieg:NaN;
  const bePct=(!isNaN(beDelta)&&erstEinstieg)?beDelta/erstEinstieg*100:NaN;
  return {tx,realized,openQty,openCost,avg,curVal,unreal,divs,gesamt,hasKurs,
    oversell,buyCostAll,gesamtPct,unrealPct,jahr,first,last,closed,days,perTx,kurs,
    erstEinstieg,breakEven,beDelta,bePct};
}

/* ---------- Render ---------- */
function render(){
  captureOpenDetails();   // offene Buchungs-Listen merken, bevor #list neu gebaut wird
  const list=document.getElementById("list");
  const total=document.getElementById("total");
  if(!state.positions.length){
    total.innerHTML="";
    list.innerHTML='<div class="empty-all">Noch keine Position.<br>Tippe auf <b>+ Position</b>, dann Käufe/Verkäufe eintragen.</div>';
    return;
  }
  // Portfolio-Summe
  let tReal=0,tUnreal=0,tDiv=0,tDivOff=0,tCur=0,tGes=0;
  const metrics=state.positions.map(p=>{const m=compute(p);
    tReal+=m.realized;tDiv+=m.divs;if(p.divOff)tDivOff+=m.divs;if(m.hasKurs){tUnreal+=m.unreal;tCur+=m.curVal;}tGes+=m.gesamt;return m;});
  const hasSym=metrics.some((m,i)=>(state.positions[i].symbol||"").trim()&&m.openQty>0);
  const upd=state.settings.pricesUpdated;
  total.innerHTML=`
    <div class="row"><b style="font-size:14px">Portfolio gesamt</b>
      <span id="syncStatus" class="lbl" style="font-size:11.5px;color:var(--muted)"></span>
      <div class="spacer"></div>
      ${syncReady()?`<button class="btn ghost" style="padding:5px 10px" onclick="fullSync(true)">⇅ Sync</button>`:""}
      ${hasSym?`<button id="refreshBtn" class="btn ghost" style="padding:5px 10px" onclick="refreshPrices()">⟳ Kurse</button>`:""}</div>
    <div class="row" style="margin-top:2px">
      <span class="hint" style="margin:0">${hasSym&&upd?`Zuletzt abgerufen: ${new Date(upd).toLocaleString("de-DE",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})} Uhr`:""}</span>
      <div class="spacer"></div>
      <span class="badge">${state.positions.length} Positionen</span></div>
    <div class="kpis">
      <div class="kpi"><div class="k">Realisiert (FIFO)</div><div class="v ${cls(tReal)}">${signEur(tReal)}</div></div>
      <div class="kpi"><div class="k">Unrealisiert</div><div class="v ${cls(tUnreal)}">${signEur(tUnreal)}</div></div>
      <div class="kpi"><div class="k">Gesamt</div><div class="v ${cls(tGes)}">${signEur(tGes)}</div></div>
    </div>
    <div class="hint" style="margin-top:8px">Offen investiert <b style="color:var(--txt)">${feur(tCur)}</b>${tDiv?` · Dividenden gesamt ${feur(tDiv)} · zählt in „Gesamt" mit${tDivOff?` <span class="red">(${feur(tDivOff)} pro Wert abgewählt)</span>`:""}`:""}</div>`;

  // Offene vs. geschlossene Positionen trennen (geschlossen = alles verkauft, aber es gab Buchungen)
  const openIdx=[], closedIdx=[];
  state.positions.forEach((p,idx)=>{
    (metrics[idx].openQty<=1e-9 && metrics[idx].tx.length>0 ? closedIdx : openIdx).push(idx);
  });
  list.innerHTML="";
  // Sortier-Leiste (flache Liste; Branche bleibt in den Daten für spätere Verteilungs-Ansicht)
  const sb=state.settings.sortBy||"size";
  if(openIdx.length){
    const bar=document.createElement("div"); bar.className="sortsel";
    bar.innerHTML=`<span class="sl">Sortieren</span><div class="sortseg">
      <button class="${sb==="size"?"on":""}" onclick="setSort('size')">Größe</button>
      <button class="${sb==="gv"?"on":""}" onclick="setSort('gv')">G/V</button>
      <button class="${sb==="name"?"on":""}" onclick="setSort('name')">Name</button></div>`;
    list.appendChild(bar);
  }
  const keyOf=idx=>{const m=metrics[idx],p=state.positions[idx];
    if(sb==="name")return (p.titel||"").toLowerCase();
    if(sb==="gv")return -m.gesamt;
    return -(m.hasKurs?m.curVal:m.openCost);};   // Größe (Default): größte Position oben
  [...openIdx].sort((a,b)=>{const ka=keyOf(a),kb=keyOf(b);return ka<kb?-1:ka>kb?1:0;})
    .forEach(idx=>list.appendChild(renderPos(state.positions[idx],metrics[idx],idx)));
  // Geschlossene in einklappbaren Bereich unten
  if(closedIdx.length){
    const sec=document.createElement("details");
    sec.className="closed-sec"; sec.setAttribute("data-pid","__closed__");
    if(openDetails.has("__closed__"))sec.open=true;
    const sum=document.createElement("summary");
    sum.className="grp-title closed-sum";
    sum.textContent="Geschlossene Positionen ("+closedIdx.length+")";
    sec.appendChild(sum);
    closedIdx.forEach(idx=>sec.appendChild(renderPos(state.positions[idx],metrics[idx],idx)));
    list.appendChild(sec);
  }
  scheduleClamp();
}

// Doppel-rAF: erst nach dem finalen Layout messen (sonst greift der Klemm-Schritt zu früh); zusätzlich nach Font-Load.
function scheduleClamp(){
  requestAnimationFrame(()=>requestAnimationFrame(clampBarLabels));
  if(document.fonts&&document.fonts.ready) document.fonts.ready.then(()=>requestAnimationFrame(clampBarLabels));
}
// Labels sitzen mittig überm Marker; hier nur bei Überlauf minimal in die Leiste schieben.
function clampBarLabels(){
  const clampInto=(l,br)=>{ const lr=l.getBoundingClientRect(); let dx=0;
    if(lr.left<br.left) dx=br.left-lr.left; else if(lr.right>br.right) dx=br.right-lr.right;
    if(dx) l.style.marginLeft=Math.round((parseFloat(l.style.marginLeft)||0)+dx)+"px"; };
  document.querySelectorAll(".esb").forEach(bar=>{
    if(!bar.clientWidth)return;                    // eingeklappt/versteckt → überspringen
    const br=bar.getBoundingClientRect();
    bar.querySelectorAll(".esb-lab,.esb-pct").forEach(l=>{ l.style.marginLeft="0px"; clampInto(l,br); });
    // Zwei getrennte obere Labels (Einstieg/jetzt): berühren sie sich, als Block um die Marker-Mitte neu setzen.
    const tops=[...bar.querySelectorAll(".esb-lab.top")];
    if(tops.length===2){
      let [L,R]=tops; let a=L.getBoundingClientRect(), b=R.getBoundingClientRect();
      if(a.left>b.left){ [L,R]=[R,L]; [a,b]=[b,a]; }
      const gap=10;
      if(a.right+gap>b.left){                        // Überlappung
        const gw=a.width+gap+b.width;                // Breite des Label-Blocks
        let gL=(a.left+a.width/2 + b.left+b.width/2)/2 - gw/2;   // zentriert auf die Marker-Mitte
        gL=Math.max(br.left, Math.min(gL, br.right-gw));         // in die Leiste klemmen
        const setL=(el,rect,target)=>{ el.style.marginLeft=Math.round((parseFloat(el.style.marginLeft)||0)+(target-rect.left))+"px"; };
        setL(L,a,gL); setL(R,b,gL+a.width+gap);
      }
    }
  });
}

function kpiBlock(m){
  const gp=isNaN(m.gesamtPct)?"":`<div class="v2">${fpct(m.gesamtPct)}</div>`;
  return `<div class="kpis">
    <div class="kpi"><div class="k">Realisiert (FIFO)</div><div class="v ${cls(m.realized)}">${signEur(m.realized)}</div></div>
    <div class="kpi"><div class="k">Unrealisiert</div>
      <div class="v ${cls(m.unreal)}">${m.hasKurs?signEur(m.unreal):"–"}</div>
      ${m.hasKurs&&!isNaN(m.unrealPct)?`<div class="v2">${fpct(m.unrealPct)}</div>`:""}</div>
    <div class="kpi"><div class="k">Gesamt</div><div class="v ${cls(m.gesamt)}">${signEur(m.gesamt)}</div>${gp}</div>
  </div>`;
}

function esBar(m){
  const E=m.erstEinstieg, B=m.breakEven, N=m.hasKurs?m.kurs:NaN;
  // Auto-Fit nach Wert (kleinster Wert links, größter rechts) MIT Mindest-Spanne:
  // normale Spannen füllen die Leiste; nur winzige %-Abstände clustern in der Mitte (kein Voll-Zoom auf 0,6%).
  const vals=[E,B]; if(!isNaN(N))vals.push(N);
  let lo=Math.min(...vals), hi=Math.max(...vals);
  const mid=(lo+hi)/2||1, minSpan=mid*0.10;                 // < ~10% Spanne → nicht auf volle Breite ziehen
  if(hi-lo<minSpan){ lo=mid-minSpan/2; hi=mid+minSpan/2; }
  const pad=(hi-lo)*0.06; lo-=pad; hi+=pad;
  const P=v=>Math.max(2,Math.min(98,(v-lo)/(hi-lo)*100));
  const up=!isNaN(N)&&N>=B;
  const pE=P(E),pB=P(B),pN=isNaN(N)?null:P(N);
  let fill="";
  if(pN!=null){const a=Math.min(pB,pN),b=Math.max(pB,pN);
    fill=`<div class="esb-fill ${up?"up":"down"}" style="left:${a}%;width:${b-a}%"></div>`;}
  // Labels farbcodiert wie die Marker: Einstieg grau (umrandeter Punkt), jetzt weiß (voller Punkt) → Wort „jetzt" entfällt.
  // Alle mittig über ihrem Marker; clampBarLabels() korrigiert nach dem Render Randüberlauf/Überschneidung.
  const eLab=p=>`<div class="esb-lab top e" style="left:${p}%;transform:translateX(-50%)"><span class="n">Einstieg</span> <span class="v">${feur(E)}</span></div>`;
  const jLab=p=>`<div class="esb-lab top j" style="left:${p}%;transform:translateX(-50%)"><span class="v">${feur(N)}</span></div>`;
  let topLabs;
  if(pN==null){ topLabs=eLab(pE); }
  else if(Math.abs(pN-pE)<30){
    // Symbole dürfen überlappen – Einstieg (grau) und aktueller Kurs (weiß) nebeneinander, zentriert auf die Marker-Mitte
    const mid=(pE+pN)/2;
    topLabs=`<div class="esb-lab top pair" style="left:${mid}%;transform:translateX(-50%)"><span class="pl e"><span class="n">Einstieg</span> <span class="v">${feur(E)}</span></span><span class="pl j"><span class="v">${feur(N)}</span></span></div>`;
  }
  else { topLabs=eLab(pE)+jLab(pN); }
  const beLab=`<div class="esb-lab bot be" style="left:${pB}%;transform:translateX(-50%)"><span class="n">Break-even</span> <span class="v">${feur(B)}</span></div>`;
  // %-Abstand des aktuellen Kurses zum Break-even – macht die Größenordnung sichtbar (auto-gezoomte Leiste zeigt sie sonst nicht)
  let pctLab="";
  if(pN!=null && B){
    const d=(N/B-1)*100;
    const txt=(up?"+":"−")+Math.abs(d).toLocaleString("de-DE",{minimumFractionDigits:1,maximumFractionDigits:1})+" %";
    pctLab=`<div class="esb-pct ${up?"up":"down"}" style="left:${(pB+pN)/2}%">${txt}</div>`;
  }
  return `<div class="esb">
    <div class="esb-trk"></div>${fill}
    <div class="esb-mk e" style="left:${pE}%"><div class="d"></div></div>
    ${pN!=null?`<div class="esb-mk j" style="left:${pN}%"><div class="d"></div></div>`:""}
    <div class="esb-mk b" style="left:${pB}%"><div class="l"></div></div>
    ${pctLab}${topLabs}${beLab}
  </div>`;
}
// Tagestrend (global %/€) und Gesamt (global €/%) – beide antippbar
function dayHtml(p,m){
  if(!(m.openQty>0)||!m.hasKurs||!(p.prevClose>0)) return "";
  const abs=m.openQty*(m.kurs-p.prevClose), pc=(m.kurs-p.prevClose)/p.prevClose*100;
  const up=pc>=0, ar=up?"▲":"▼";
  const txt=ar+" "+(state.settings.dayMode==="eur"? eur.format(Math.abs(abs)) : pct.format(Math.abs(pc))+" %");
  return `<div class="ph-day ${up?"up":"down"}" onclick="toggleDayMode(event)">${txt}</div>`;
}
function gesHtml(m){
  const txt=state.settings.gesMode==="pct"? fpct(m.gesamtPct) : signEur(m.gesamt);
  return `<b class="gv ${cls(m.gesamt)}" onclick="toggleGesMode(event)">${txt}</b>`;
}
function toggleDayMode(e){if(e)e.stopPropagation();state.settings.dayMode=state.settings.dayMode==="eur"?"pct":"eur";save();render();}
function toggleGesMode(e){if(e)e.stopPropagation();state.settings.gesMode=state.settings.gesMode==="pct"?"eur":"pct";save();render();}
function toggleCollapse(id){const c=state.settings.collapsed||(state.settings.collapsed={});c[id]=!c[id];save();render();}

function renderPos(p,m,idx){
  const el=document.createElement("div");
  const stopVal=num(p.stop);
  const belowStop=m.hasKurs && stopVal>0 && m.kurs<stopVal;   // Kurs unter Stop
  el.className="pos"+(m.oversell?" warn":"")+(belowStop?" stop":"");
  const fxNote = p.fxFrom?` · <span class="lbl">≈ aus ${esc(p.fxFrom)}</span>`:"";
  const tsNote = (p.kursTime&&(Date.now()-p.kursTime>18e5))?` · <span class="lbl">${esc(kursTimeLbl(p.kursTime))}</span>`:"";
  const openLine = m.openQty>0
    ? `<span><b>${numf.format(m.openQty)}</b> St. · Ø ${feur(m.avg)}${fxNote}${tsNote}</span>`
    : `<span>Position geschlossen</span>`;
  // Transaktionsliste
  let txHtml="";
  const allEntries=[
    ...m.tx.map(t=>({...t,_kind:"tx"})),
    ...(p.div||[]).map(d=>({...d,_kind:"div"}))
  ].sort((a,b)=> (a.datum<b.datum?-1:a.datum>b.datum?1:0));
  if(!allEntries.length){txHtml='<div class="pos-empty">Noch keine Buchung.</div>';}
  else for(const e of allEntries){
    if(e._kind==="div"){
      txHtml+=`<div class="tx"><span class="tag div">Div</span>
        <span class="desc"><span class="nb">${fdate(e.datum)}</span>${e.notiz?" · "+esc(e.notiz):""}</span>
        <span class="amt green">${signEur(num(e.netto)||0)}</span>

    }else{
      const st=num(e.stueck),ku=num(e.kurs),ge=num(e.gebuehr)||0;
      const wert=e.typ==="kauf"?-(st*ku+ge):(st*ku-ge);
      const r=m.perTx[e.id];
      let extra="";
      if(e.typ==="verkauf"&&r){
        const parts=r.matched.map(x=>`<span class="nb">${numf.format(x.q)}@${feur(x.price)}</span>`).join(" + ");
        extra=` · <span class="nb">FIFO:</span> ${parts||"–"} <span class="nb">→ <b class="${cls(r.realized)}">${signEur(r.realized)}</b></span>`;
      }
      txHtml+=`<div class="tx">
        <span class="tag ${e.typ}">${e.typ==="kauf"?"Kauf":"Verk."}</span>
        <span class="desc"><span class="nb">${fdate(e.datum)}</span> · <span class="nb">${numf.format(st)}×${feur(ku)}</span>${ge?` <span class="nb">(Geb ${feur(ge)})</span>`:""}${extra}${e.notiz?" · "+esc(e.notiz):""}</span>
        <span class="amt ${e.typ==="kauf"?"":cls(wert)}">${e.typ==="kauf"?feur(-wert):"+"+eur.format(wert)}</span>
        <button class="txedit" onclick="openTx('${p.id}','${e.id}')">✎</button></div>`;
    }
  }
  const collapsed=(state.settings.collapsed||{})[p.id];
  const stopBadge = p.stop?` <span class="badge${belowStop?" badge-red":""}">Stop ${feur(num(p.stop))}</span>`:"";
  const gesWrap = `<span class="ph-ges">Gesamt ${gesHtml(m)}</span>`;
  const subLeft = m.openQty>0 ? `<span>Position <b>${feur(m.curVal)}</b></span> ${gesWrap}` : `<span>Geschlossen</span> ${gesWrap}`;
  const right = m.openQty>0 ? `<div class="ph-right"><div class="ph-kurs">${m.hasKurs?feur(m.kurs):"—"}</div>${dayHtml(p,m)}</div>` : "";
  el.innerHTML=`
    <div class="pos-head" onclick="toggleCollapse('${p.id}')">
      <div class="ph-left">
        <div class="titel">${esc(p.titel||"(ohne Titel)")}<span class="chev">${collapsed?"▸":"▾"}</span></div>
        <div class="ph-sub">${subLeft}${stopBadge}</div>
      </div>
      ${right}
      <button class="txedit ph-edit" onclick="event.stopPropagation();openPos('${p.id}')">✎</button>
    </div>
    <div class="pos-body"${collapsed?' style="display:none"':''}>
      ${m.openQty>0&&!isNaN(m.erstEinstieg)?esBar(m):""}
      ${kpiBlock(m)}
      <div class="meta">
        ${openLine}
        ${m.divs?`<button class="divchip ${p.divOff?"off":""}" onclick="toggleDivOff('${p.id}')" title="Dividende in Gesamt mitzählen"><span class="cbox">${p.divOff?"":"✓"}</span> Div ${feur(m.divs)} in Gesamt</button>`:""}
      </div>
      ${belowStop?`<div class="stopmsg">⚠︎ Kurs ${feur(m.kurs)} unter Stop ${feur(stopVal)}</div>`:""}
      ${m.oversell?`<div class="warnmsg">⚠︎ Es wurde mehr verkauft als (bisher) gekauft — prüfe die Stückzahlen.</div>`:""}
      <div class="pos-actions">
        <button class="btn sm" onclick="openTx('${p.id}')">+ Kauf/Verkauf</button>
        <button class="btn sec sm" onclick="openDiv('${p.id}')">+ Dividende</button>
      </div>
      <details data-pid="${p.id}" ${openDetails.has(p.id)?"open":""}><summary>Buchungen (${allEntries.length})</summary>${txHtml}</details>
    </div>
  `;
  return el;
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function toggleDivOff(pid){const p=find(pid);if(!p)return;p.divOff=!p.divOff;touch(p);save();render();syncPushLater();}

/* ---------- Live-Kurse (Twelve Data, CORS-offen, Gratis-Key) ---------- */
const DAILY_CAP=800, RESERVE=5, AUTO_THROTTLE_MS=60000;
let priceBusy=false;
function usageToday(){
  const u=state.settings.priceUsage;
  return (u && u.date===today()) ? (u.count||0) : 0;
}
function addUsage(n){
  const cur=(state.settings.priceUsage && state.settings.priceUsage.date===today())
    ? state.settings.priceUsage : {date:today(),count:0};
  cur.count=(cur.count||0)+n; state.settings.priceUsage=cur;
}
function openSymbols(){
  return [...new Set(state.positions
    .filter(p=>compute(p).openQty>0 && (p.symbol||"").trim())
    .map(p=>p.symbol.trim()))];
}
// Wechselkurs CUR→EUR (kostenlos, ohne Key): Frankfurter/ECB, Fallback open.er-api
async function fxToEur(cur){
  if(!cur || cur==="EUR") return 1;
  try{ const j=await (await fetch("https://api.frankfurter.dev/v1/latest?base="+encodeURIComponent(cur)+"&symbols=EUR",{cache:"no-store"})).json();
    if(j&&j.rates&&j.rates.EUR>0) return j.rates.EUR; }catch(e){}
  try{ const j=await (await fetch("https://open.er-api.com/v6/latest/"+encodeURIComponent(cur),{cache:"no-store"})).json();
    if(j&&j.rates&&j.rates.EUR>0) return j.rates.EUR; }catch(e){}
  return null;
}
// ---- Live-Kurse: Yahoo Finance über CORS-Proxy (kein Key; deckt US + Xetra/EU) ----
// Yahoo blockt direkte Browser-Aufrufe (CORS) → über gratis Proxy. corsproxy primär, allorigins als Fallback.
const PROXIES=[
  {mk:u=>"https://corsproxy.io/?url="+encodeURIComponent(u), wrap:false},
  {mk:u=>"https://api.allorigins.win/get?url="+encodeURIComponent(u), wrap:true}
];
async function proxyJSON(url){
  let last="";
  for(const p of PROXIES){
    try{
      const r=await fetch(p.mk(url),{cache:"no-store"});
      if(!r.ok){ last="HTTP "+r.status; continue; }
      if(p.wrap){ const w=await r.json(); return JSON.parse(w.contents); }
      return await r.json();
    }catch(e){ last=e.name||"Fehler"; }
  }
  throw new Error(last||"Proxy nicht erreichbar");
}
async function yahooQuote(sym){
  const u="https://query1.finance.yahoo.com/v8/finance/chart/"+encodeURIComponent(sym)+"?range=1d&interval=1d";
  const b=await proxyJSON(u);
  const m=b&&b.chart&&b.chart.result&&b.chart.result[0]&&b.chart.result[0].meta;
  if(!m || m.regularMarketPrice==null) throw new Error("kein Kurs (Ticker prüfen)");
  return {price:+m.regularMarketPrice, cur:m.currency||"EUR", time:(m.regularMarketTime?m.regularMarketTime*1000:0),
    prev:(m.chartPreviousClose!=null?m.chartPreviousClose:(m.previousClose!=null?m.previousClose:null))};
}
// Zeigt, VON WANN der Kurs ist (Börsen-Zeitstempel) — heute = evtl. live (~15 Min verzögert), sonst Schlusskurs.
function kursTimeLbl(ms){
  if(!ms) return "";
  const d=new Date(ms), now=new Date();
  const hm=d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});
  if(d.toDateString()===now.toDateString()) return "Stand heute "+hm;
  const y=new Date(now); y.setDate(now.getDate()-1);
  if(d.toDateString()===y.toDateString()) return "Stand gestern "+hm;
  const wd=["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
  return "Stand "+wd+" "+d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"})+" "+hm;
}
async function refreshPrices(auto){
  if(priceBusy)return;
  const syms=openSymbols();
  if(!syms.length){ if(!auto)alert("Keine offene Position mit Symbol. Trage bei einer Position einen Yahoo-Ticker ein (🔍 im Positions-Editor)."); return; }
  if(auto && state.settings.pricesUpdated && Date.now()-state.settings.pricesUpdated < AUTO_THROTTLE_MS)return; // Kurz-Sperre gegen schnelles Neuladen
  priceBusy=true;
  const btn=document.getElementById("refreshBtn"); if(btn)btn.textContent="⟳ lädt…";
  try{
    // Pro Symbol EINZELN → ein kaputter Ticker blockiert die anderen nicht.
    const quotes={}; const fail=[];
    const CHUNK=4;   // wenige parallel → schont den Gratis-Proxy (zu viele auf einmal → TypeError)
    for(let i=0;i<syms.length;i+=CHUNK){
      await Promise.all(syms.slice(i,i+CHUNK).map(async sym=>{
        for(let a=0;a<3;a++){                                  // bis zu 3 Versuche (Proxy zickt gern kurz)
          try{ quotes[sym]=await yahooQuote(sym); return; }
          catch(e){ if(a<2){ await sleep(400); continue; } fail.push(sym+" — "+(e.message||"kein Kurs")); }
        }
      }));
      if(i+CHUNK<syms.length) await sleep(200);                // kleine Pause zwischen den Bündeln
    }
    // Fremdwährungen → EUR (je Währung einmal, kostenlos ohne Key)
    const curs=[...new Set(Object.values(quotes).map(q=>q.cur).filter(c=>c&&c!=="EUR"))];
    const fx={};
    for(const c of curs){ const r=await fxToEur(c); if(r) fx[c]=r; }
    let ok=0;
    for(const p of state.positions){
      const s=(p.symbol||"").trim();
      if(!s || compute(p).openQty<=0)continue;
      const q=quotes[s]; if(!q)continue;
      let eur=q.price, pv=(q.prev!=null?q.prev:null), from="";
      if(q.cur && q.cur!=="EUR"){
        if(fx[q.cur]===undefined){ const msg=s+" — €-Umrechnung ("+q.cur+") nicht verfügbar"; if(!fail.includes(msg))fail.push(msg); continue; }
        eur=q.price*fx[q.cur]; if(pv!=null)pv*=fx[q.cur]; from=q.cur;
      }
      p.kursAktuell=(+(eur.toFixed(eur<10?4:2))+"").replace(".",","); p.fxFrom=from; p.kursTime=q.time||Date.now(); p.prevClose=(pv!=null?+pv.toFixed(4):null);
      ok++;
    }
    state.settings.pricesUpdated=Date.now();
    save(); render();
    if(auto){ if(ok)toast("✓ Kurse aktualisiert"); }
    else if(fail.length)alert(ok+" Kurs(e) aktualisiert.\n\nKein Kurs für:\n• "+fail.join("\n• ")+

/* ---------- GitHub-Sync (privates Repo, nur Positionen; Keys bleiben lokal) ---------- */
let syncBusy=false, pushTimer=null;
function ghCfg(){const g=state.settings.gh||{};return {token:(g.token||"").trim(),repo:(g.repo||"").trim(),
  path:(g.path||"trading.json").trim(),branch:(g.branch||"main").trim()};}
function syncReady(){const c=ghCfg();return !!(c.token&&c.repo&&c.path);}
function b64encode(str){ // in Blöcken kodieren, sonst sprengt fromCharCode.apply bei großen Daten den Call-Stack (v.a. mobil)
  const bytes=new TextEncoder().encode(str); let bin=""; const CH=0x8000;
  for(let i=0;i<bytes.length;i+=CH) bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+CH));
  return btoa(bin);
}
function b64decode(b64){return new TextDecoder().decode(Uint8Array.from(atob(b64),c=>c.charCodeAt(0)));}
function u(o){return (o&&o._u)||0;}

// Nur Positionen + Tombstones werden gesynct (KEINE settings/Token/Keys)
function syncPayload(){return {positions:state.positions, tombstones:state.tombstones||{}, syncedAt:Date.now()};}

// Zwei Listen (tx bzw. div) nach id + Änderungszeit + Tombstones zusammenführen
function mergeList(a,b,tomb){
  const map={};
  for(const it of (a||[]).concat(b||[])){
    if(!it||!it.id)continue;
    if(!map[it.id] || u(it)>=u(map[it.id])) map[it.id]=it;
  }
  return Object.values(map).filter(it=>!(tomb[it.id] && tomb[it.id]>=u(it)));
}
// Gesamt-Merge zweier Zustände
function mergeStates(local,remote){
  const tomb={};
  for(const src of [local.tombstones||{}, remote.tombstones||{}])
    for(const id in src) tomb[id]=Math.max(tomb[id]||0, src[id]||0);
  const byId={};
  for(const p of (local.positions||[]).concat(remote.positions||[])){
    if(!p||!p.id)continue;
    if(!byId[p.id]) byId[p.id]={L:null,R:null};
  }
  const lmap={},rmap={};
  (local.positions||[]).forEach(p=>p&&p.id&&(lmap[p.id]=p));
  (remote.positions||[]).forEach(p=>p&&p.id&&(rmap[p.id]=p));
  const positions=[];
  for(const id in byId){
    const L=lmap[id], R=rmap[id];
    const base = (!R || u(L)>=u(R)) ? L : R;   // Skalarfelder: neuere Position gewinnt
    if(!base) continue;
    const merged={...base};
    merged.tx  = mergeList(L&&L.tx,  R&&R.tx,  tomb);
    merged.div = mergeList(L&&L.div, R&&R.div, tomb);
    // Position gelöscht? (Tombstone neuer als letzte Änderung UND keine überlebenden Buchungen erzwingen Behalt)
    if(tomb[id] && tomb[id]>=u(base)) continue;
    positions.push(merged);
  }
  return {positions, tombstones:tomb};
}

const sleep=ms=>new Promise(r=>setTimeout(r,ms));
async function ghGet(){
  const c=ghCfg();
  const [owner,repo]=c.repo.split("/");
  // Cache umgehen: eindeutiger Parameter + no-store → GitHub liefert die AKTUELLE sha (nicht die gecachte)
  const url=`https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(c.path)}?ref=${encodeURIComponent(c.branch)}&_=${Date.now()}`;
  const r=await fetch(url,{cache:"no-store",headers:{Authorization:"Bearer "+c.token,Accept:"application/vnd.github+json"}});
  if(r.status===404) return {data:{positions:[],tombstones:{}}, sha:null};
  if(!r.ok) throw new Error("GET "+r.status+" "+(await r.text()).slice(0,140));
  const j=await r.json();
  let data={positions:[],tombstones:{}};
  try{ data=JSON.parse(b64decode(j.content.replace(/\n/g,""))); }catch(e){}
  return {data, sha:j.sha};
}
async function ghPut(payload, sha){
  const c=ghCfg();
  const [owner,repo]=c.repo.split("/");
  const url=`https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(c.path)}`;
  const body={message:"trading sync "+new Date().toISOString(), content:b64encode(JSON.stringify(payload,null,2)), branch:c.branch};
  if(sha) body.sha=sha;
  const r=await fetch(url,{method:"PUT",cache:"no-store",headers:{Authorization:"Bearer "+c.token,Accept:"application/vnd.github+json"},body:JSON.stringify(body)});
  const txt=await r.text();
  if(!r.ok){ const err=new Error("PUT "+r.status+" "+txt.slice(0,140)); err.status=r.status; throw err; }
  try{ return JSON.parse(txt).content.sha; }catch(e){ return null; }
}

// Voll-Sync: holen → mergen → zurückschreiben; bei sha-Konflikt (409) mit frischer sha erneut versuchen
async function fullSync(manual){
  if(syncBusy || !syncReady()){ if(manual&&!syncReady())alert("Bitte zuerst Repo + Token im Backup-Menü eintragen."); return; }
  syncBusy=true; setSyncStatus("Sync…");
  try{
    let done=false, lastErr=null;
    for(let attempt=0; attempt<5 && !done; attempt++){
      const {data:remote,sha}=await ghGet();     // cache-umgehend → aktuelle sha
      const merged=mergeStates({positions:state.positions,tombstones:state.tombstones}, remote);
      state.positions=merged.positions; state.tombstones=merged.tombstones;
      save(); render();
      try{ await ghPut(syncPayload(), sha); done=true; }
      catch(e){ lastErr=e; if(e.status===409){ await sleep(500); continue; } throw e; } // sha veraltet → neu holen
    }
    if(!done) throw lastErr||new Error("Konflikt nach mehreren Versuchen");
    state.settings.syncedAt=Date.now(); save(); render();
    setSyncStatus("");
    if(manual)toast("✓ Synchronisiert");
  }catch(e){
    setSyncStatus("Sync-Fehler");
    if(manual)alert("Sync fehlgeschlagen:\n"+e.message+"\n\nRepo (owner/repo), Token-Rechte (Contents: Read/Write) und Branch prüfen.");
  }finally{ syncBusy=false; }
}
function syncPushLater(){ // nach Änderungen automatisch (gebündelt) hochladen
  if(!syncReady() || state.settings.autoSync===false) return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>fullSync(false), 1500);
}
function setSyncStatus(t){ const e=document.getElementById("syncStatus"); if(e)e.textContent=t; }

function importJson(inp){
  const f=inp.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{try{const d=JSON.parse(rd.result);
    if(!d||!Array.isArray(d.positions))throw 0;
    if(!confirm("Aktuelle Daten durch Import ersetzen?"))return;
    const prevKey=(state.settings&&state.settings.apiKey)||"";
    const prevGh=(state.settings&&state.settings.gh)||null;
    state=d;
    if(!state.settings)state.settings={};
    if(!state.tombstones)state.tombstones={};
    if(!state.settings.apiKey && prevKey)state.settings.apiKey=prevKey;     // Key nicht verlieren
    if((!state.settings.gh || !state.settings.gh.token) && prevGh)state.settings.gh=prevGh; // Sync-Config/Token nicht verlieren
